version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: finpulse
      POSTGRES_PASSWORD: finpulse_dev
      POSTGRES_DB: finpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://finpulse:finpulse_dev@db:5432/finpulse"
      JWT_SECRET: "docker-dev-secret-change-in-production"
      GROQ_API_KEY: "${GROQ_API_KEY:-your-groq-key-here}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
