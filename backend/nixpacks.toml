[phases.setup]
# Do NOT add python311 here — Nixpacks already provides Python 3.12 and a second
# Python package causes a Nix store collision at build time.
nixLibs = ["...", "zlib", "gcc-unwrapped", "stdenv.cc.cc.lib"]
aptPkgs = ["...", "libstdc++6", "zlib1g", "libgomp1", "libgfortran5"]

[phases.install]
cmds = [
  "pip install torch --index-url https://download.pytorch.org/whl/cpu",
  "pip install -r requirements.txt",
  "chmod +x start.sh",
]

[start]
cmd = "sh start.sh"
